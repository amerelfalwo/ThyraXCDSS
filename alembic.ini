# Alembic Configuration — ThyraX CDSS
# The sqlalchemy.url is overridden at runtime from settings.DATABASE_URL
# (see alembic/env.py). This value is a fallback only.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# The actual connection URL is injected from app.core.config.settings
# in env.py. This placeholder is intentionally generic.
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/thyrax

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
